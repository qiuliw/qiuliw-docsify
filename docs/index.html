<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>qiuliw blog</title>
  <link rel="icon" href="_media/favicon.ico">
  <meta name="description" content="qiuliw 个人文档站点">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/themes/core.min.css">
  <style>
    .doc-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      margin-top: 2.5rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
      font-size: var(--font-size-s);
      line-height: var(--line-height);
      color: var(--color-mute);
    }

    .doc-meta-updated {
      margin-left: auto;
      text-align: right;
    }

    .doc-meta time {
      color: var(--color-text);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
  </style>
</head>
<body class="loading">
  <div id="app">加载中...</div>
  <script>
    window.$docsify = {
      name: 'qiuliw blog',
      repo: '',
      coverpage: true,
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        placeholder: '搜索',
        noData: '没有找到结果',
        depth: 3,
      },
      plugins: [
        function docMeta(hook, vm) {
          function pad(n) {
            return n < 10 ? '0' + n : '' + n;
          }

          function formatMetaDate(value) {
            if (!value) return null;

            if (value instanceof Date && !isNaN(value.getTime())) {
              return {
                display:
                  value.getFullYear() +
                  '/' +
                  pad(value.getMonth() + 1) +
                  '/' +
                  pad(value.getDate()) +
                  ' ' +
                  pad(value.getHours()) +
                  ':' +
                  pad(value.getMinutes()),
                datetime: value.toISOString(),
              };
            }

            var text = String(value);
            return { display: text, datetime: text };
          }

          hook.afterEach(function (html, next) {
            var fm = vm.frontmatter || {};
            var created = formatMetaDate(fm.created);
            var updated = formatMetaDate(fm.updated);

            if (!created && !updated) {
              next(html);
              return;
            }

            var left = '';
            var right = '';

            if (created) {
              left =
                '<span class="doc-meta-created">创建于 <time datetime="' +
                created.datetime +
                '">' +
                created.display +
                '</time></span>';
            }
            if (updated) {
              right =
                '<span class="doc-meta-updated">更新于 <time datetime="' +
                updated.datetime +
                '">' +
                updated.display +
                '</time></span>';
            }

            var meta = '<footer class="doc-meta">' + left + right + '</footer>';

            next(html + meta);
          });
        },
      ],
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@5.0.0-rc.4/dist/plugins/front-matter.min.js"></script>
</body>
</html>
